<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Release Oracle</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --card-hover: #1f2937;
            --border-color: #374151;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --font-family: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--font-family); 
            background: var(--bg-color); 
            background-image: radial-gradient(circle at top center, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
        }

        header {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        h1 { 
            margin: 0; color: var(--text-main); font-size: 1.5rem; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; gap: 10px; letter-spacing: -0.025em; transition: opacity 0.2s;
        }
        
        h1:hover { opacity: 0.8; }
        h1 span { color: var(--accent-blue); }

        .controls { display: flex; align-items: center; gap: 16px; font-size: 0.875rem; color: var(--text-muted); font-weight: 500; }

        .refresh-btn { 
            background: var(--accent-blue); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; 
            cursor: pointer; font-weight: 600; font-size: 0.875rem; font-family: var(--font-family);
            transition: all 0.2s; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
        
        .refresh-btn:hover { background: #2563eb; transform: translateY(-1px); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 24px; }
        
        .view-toggles { display: flex; background: rgba(31, 41, 55, 0.8); padding: 4px; border-radius: 8px; border: 1px solid var(--border-color); }
        .toggle-btn { background: transparent; color: var(--text-muted); border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
        .toggle-btn.active { background: #374151; color: var(--text-main); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 40px; }

        .summary-card {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 24px;
            display: flex; flex-direction: column; gap: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
            background: linear-gradient(145deg, #111827, #0b0f19);
        }

        .summary-card:hover { transform: translateY(-4px); background: #1f2937; border-color: var(--accent-blue); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

        .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .summary-card h4 { margin: 0; font-size: 1.25rem; color: var(--text-main); font-weight: 700; letter-spacing: -0.01em; flex: 1; }
        
        .release-hero { 
            background: rgba(239, 68, 68, 0.05); border-radius: 16px; padding: 16px; border: 1px solid rgba(239, 68, 68, 0.1);
            display: flex; flex-direction: column; gap: 4px;
        }

        .summary-date { 
            font-size: 2rem; font-weight: 800; color: #f87171; line-height: 1.2; letter-spacing: -0.025em; margin: 0;
        }
        
        .summary-meta { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        .metric-countdown { 
            font-size: 0.7rem; background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); 
            padding: 4px 10px; border-radius: 8px; font-weight: 700; border: 1px solid rgba(59, 130, 246, 0.2);
            text-transform: uppercase; white-space: nowrap;
        }

        .window-box {
            background: rgba(0, 0, 0, 0.2); border-radius: 12px; padding: 12px 16px; border: 1px solid var(--border-color);
        }
        .window-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
        .window-dates { font-size: 0.85rem; color: var(--text-main); font-weight: 600; }

        .detail-view { display: none; }
        .back-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 24px; display: inline-flex; align-items: center; gap: 8px; font-size: 0.875rem; font-weight: 500; }

        .chart-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 32px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); }
        .chart-container { position: relative; height: 500px; width: 100%; margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 24px; }
        
        .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 1.125rem; background: var(--card-bg); border: 1px dashed var(--border-color); border-radius: 16px; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        /* Timeline Customizations */
        #timeline-view { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 40px; margin-bottom: 40px; display: none; }
        .timeline-container { position: relative; max-width: 800px; margin: 0 auto; padding: 40px 0; }
        .timeline-container::after { content: ''; position: absolute; width: 4px; background: linear-gradient(to bottom, transparent, var(--accent-purple), var(--accent-blue), transparent); top: 0; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 4px; opacity: 0.4; }
        .timeline-item { padding: 10px 40px; position: relative; background-color: inherit; width: 50%; box-sizing: border-box; }
        .timeline-item::after { content: ''; position: absolute; width: 16px; height: 16px; right: -12px; background-color: var(--card-bg); border: 4px solid var(--accent-blue); top: 28px; border-radius: 50%; z-index: 1; transition: all 0.3s; box-shadow: 0 0 0 4px var(--card-bg), 0 0 12px rgba(59, 130, 246, 0.6); }
        .timeline-item.left { left: 0; }
        .timeline-item.right { left: 50%; }
        .timeline-item.right::after { left: -12px; }
        .timeline-content { padding: 24px; background: linear-gradient(145deg, #1f2937, #111827); border-radius: 12px; border: 1px solid var(--border-color); cursor: pointer; transition: all 0.3s; }
        .timeline-content:hover { transform: translateY(-4px) scale(1.02); border-color: var(--accent-blue); }
        .timeline-date { color: var(--accent-red); font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; display: inline-block; background: rgba(239, 68, 68, 0.1); padding: 4px 12px; border-radius: 20px; }
        .timeline-title { color: var(--text-main); font-size: 1.25rem; font-weight: 700; margin: 12px 0; }
        .timeline-metrics { font-size: 0.85rem; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; }
        .timeline-spacer { position: absolute; left: 50%; transform: translateX(-50%); color: var(--text-muted); font-size: 0.75rem; background: var(--card-bg); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-color); z-index: 2; font-weight: 600; }
        
        @media screen and (max-width: 600px) {
            .timeline-container::after { left: 31px; transform: none; }
            .timeline-item { width: 100%; padding-left: 70px; padding-right: 0px; }
            .timeline-item.left::after, .timeline-item.right::after { left: 19px; }
            .timeline-item.right { left: 0%; }
            .timeline-spacer { left: 31px; }
        }
        
        footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.875rem; border-top: 1px solid var(--border-color); margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1 onclick="showSummary()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span>AI</span> Release Oracle
            </h1>
            <div class="controls">
                <div class="view-toggles">
                    <button id="btn-cards" class="toggle-btn active" onclick="setViewMode('cards')">Cards</button>
                    <button id="btn-timeline" class="toggle-btn" onclick="setViewMode('timeline')">Timeline</button>
                </div>
                <span id="last-updated">Updating...</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="summary-view">
            <div id="summary-root" class="summary-grid">
                <div style="grid-column: 1 / -1;" class="loading pulse">Loading prediction data...</div>
            </div>
            <div id="timeline-view">
                <div id="timeline-root" class="timeline-container"></div>
            </div>
        </div>

        <div id="detail-view" class="detail-view">
            <button class="back-btn" onclick="showSummary()">Back to Overview</button>
            <div id="detail-root"></div>
        </div>
    </div>
    
    <footer><p>Predictions based on Polymarket probabilistic data. Shaded areas represent ±1 Standard Deviation.</p></footer>

    <script>
        let cachedData = null;
        let currentViewMode = 'cards';
        Chart.defaults.color = '#9ca3af';
        Chart.defaults.font.family = "'Inter', sans-serif";

        function setViewMode(mode) {
            currentViewMode = mode;
            document.getElementById('btn-cards').classList.toggle('active', mode === 'cards');
            document.getElementById('btn-timeline').classList.toggle('active', mode === 'timeline');
            document.getElementById('summary-root').style.display = mode === 'cards' ? 'grid' : 'none';
            document.getElementById('timeline-view').style.display = mode === 'timeline' ? 'block' : 'none';
        }

        async function loadData() {
            try {
                const updatedEl = document.getElementById('last-updated');
                updatedEl.innerText = 'Updating...';
                const response = await fetch('/api/data');
                const result = await response.json();
                cachedData = result.data;
                renderView();
                
                if (result.last_updated) {
                    updatedEl.innerText = 'Data from: ' + moment(result.last_updated).format('MMM D, h:mm A');
                } else {
                    updatedEl.innerText = 'No data available';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('last-updated').innerText = 'Error';
            }
        }

        function getTimeUntilNextMidnight() {
            const now = moment.utc();
            const nextMidnight = moment.utc().add(1, 'day').startOf('day');
            return nextMidnight.diff(now);
        }

        loadData();
        setTimeout(() => {
            loadData();
            setInterval(loadData, 86400000); // Refresh daily
        }, getTimeUntilNextMidnight() + 120000);
    </script>
</body>
</html>
